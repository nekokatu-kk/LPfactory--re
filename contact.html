<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="HANDS ON 採用サイトのお問い合わせフォームです。採用に関するご質問はこちらからお気軽にご連絡ください。">

	<!--OGP-->
	<meta property="og:title" content="未経験歓迎｜HANDS ON 採用サイト">
	<meta property="og:description" content="金属加工の技術を一から学び、将来に活かせるスキルを身につけませんか？未経験から成長できる職場です。">
	<meta property="og:image" content="https://example.com/images/hero.jpg">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://example.com/">
	<!--OGP-->

	<title>お問い合わせ｜HANDS ON</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<div class="site-wrapper">

		<header class="site-header">

			<div class="header-inner">

				<a href="/">
					<img src="images/logo.svg" alt="企業ロゴ" width="240" height="64" class="logo">
				</a>

			</div><!--/.header-inner-->

		</header>

		<main class="main-offset">

			<section class="contact">

				<h1>お問い合わせ</h1>

				<form action="#" method="post" class="contact-form" novalidate>

					<div class="form-group">
						<label for="name">お名前<span class="required">※必須</span></label>
						<input type="text" id="name" name="name" required autocomplete="name" placeholder="例）山田 太郎">
						<p class="error-message"></p>
					</div>

					<div class="form-group">
						<label for="tel">電話番号</label>
						<input type="tel" id="tel" name="tel" autocomplete="tel" placeholder="例）090-1234-5678">
						<p class="error-message"></p>
					</div>

					<div class="form-group">
						<label for="email">メールアドレス<span class="required">※必須</span></label>
						<input type="email" id="email" name="email" required autocomplete="email" placeholder="example@example.com">
						<p class="error-message"></p>
					</div>

					<div class="form-group">
						<label for="message">お問い合わせ内容<span class="required">※必須</span></label>
						<textarea id="message" name="message" rows="5" required placeholder="お問い合わせ内容をご記入ください"></textarea>
						<p class="error-message"></p>
					</div>

					<div class="form-actions">
						<button type="submit">入力内容を確認</button>
					</div>

				</form>

			</section><!--/.contact-->

			<section class="confirm" hidden>

				<h2>入力内容の確認</h2>

				<p>※内容に間違いが無ければ送信するを押してください。</p>

				<ul>
					<li>お名前：<span id="confirm-name"></span></li>
					<li>電話番号：<span id="confirm-tel"></span></li>
					<li>メール：<span id="confirm-email"></span></li>
					<li>お問い合わせ内容：
						<div id="confirm-message" class="confirm-textarea"></div>
					</li>
				</ul>

				<div class="confirm-actions">

					<button id="back">修正する</button>

					<button id="submit-final">送信する</button>

				</div><!--/.confirm-actions-->

			</section>

			<nav class="back-to-top">
				<a href="index.html">採用サイトトップへ戻る</a>
			</nav>

		</main>

		<footer class="site-footer">

			<aside>※本サイトは架空のサイトです。</aside>

			<nav class="footer-nav">

				<ul>

					<li>
						<a href="privacy-policy.html">プライバシーポリシー</a>
					</li>

					<li>
						<a href="contact.html">お問い合わせ</a>
					</li>

					<li class="footer-tel">

						<p class="tel-text">
							電話でのお問い合わせはこちら
						</p>

						<small class="tel-time">
							受付時間 9:00〜17:00
						</small>

						<a href="tel:☆☆☆☆☆☆☆☆☆☆☆" class="tel-icon">
							<i class="fa-solid fa-phone-volume"></i>
							<span>☆☆☆-☆☆☆☆-☆☆☆☆</span>
						</a>

					</li>

				</ul>

			</nav>

			<small>&copy;HANDS&nbsp;ON</small>

		</footer><!--/.site-footer-->

	</div><!--/.site-wrapper-->

	<!--フォームの入力エラー-->

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const forms = document.querySelectorAll('.contact-form');

			forms.forEach(form => {

				form.addEventListener('submit', (e) => {
					e.preventDefault();
					let isValid = true;
					const requiredFieldsInside = form.querySelectorAll('[required]');

					requiredFieldsInside.forEach(field => {
						const formGroup = field.closest('.form-group');
						const errorMessage = formGroup.querySelector('.error-message');

						if (field.value.trim() === '') {
							formGroup.classList.add('has-error');
							errorMessage.textContent = '入力してください！';
							isValid = false;
						} else {
							formGroup.classList.remove('has-error');
							errorMessage.textContent = '';
						}
					});

					if (!isValid) return;

					document.getElementById('confirm-name').textContent = form.name.value;
					document.getElementById('confirm-tel').textContent = form.tel.value;
					document.getElementById('confirm-email').textContent = form.email.value;
					document.getElementById('confirm-message').textContent = form.message.value;

					form.closest('section.contact').hidden = true;
					document.querySelector('.confirm').hidden = false;
				});

				const requiredFieldsOutside = form.querySelectorAll('[required]');
				requiredFieldsOutside.forEach(field => {
					field.addEventListener('input', () => {
						const formGroup = field.closest('.form-group');
						const errorMessage = formGroup.querySelector('.error-message');

						if (field.value.trim() !== '') {
							formGroup.classList.remove('has-error');
							errorMessage.textContent = '';
						}

					});
				});
			});

			document.getElementById('back').addEventListener('click', () => {
				document.querySelector('.confirm').hidden = true;  // 確認画面を隠す
				document.querySelector('.contact').hidden = false; // フォームを再表示
			});

			document.getElementById('submit-final').addEventListener('click', () => {
				window.location.href = "thanks.html";
			});

		});

	</script>

</body>

</html>
